<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>からだでアソボ！ あたまとからだのトレーニング</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Arial Rounded MT Bold', 'Rounded Mplus 1c', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #gameCanvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
  }
  #screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    pointer-events: none;
  }
  .overlay {
    background: rgba(0,0,0,0.82);
    border-radius: 30px;
    padding: 30px 50px;
    pointer-events: all;
    max-width: 90vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  h1 {
    font-size: 52px;
    color: #FFD700;
    text-shadow: 4px 4px 0 #FF6B00, -2px -2px 0 #FF6B00;
    margin-bottom: 10px;
    animation: bounce 1s infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-8px); }
  }
  .subtitle {
    font-size: 22px;
    color: #A0FFFF;
    margin-bottom: 16px;
  }
  .hint {
    font-size: 17px;
    color: #ccc;
    margin-bottom: 20px;
    line-height: 1.7;
  }

  /* 難易度選択 */
  .diff-label {
    font-size: 20px;
    color: #FFD700;
    margin-bottom: 12px;
  }
  .diff-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .diff-btn {
    font-size: 20px;
    font-family: inherit;
    background: rgba(255,255,255,0.12);
    color: white;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    padding: 12px 28px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, transform 0.1s;
  }
  .diff-btn.selected {
    background: linear-gradient(135deg, #FF6B00, #FFD700);
    border-color: #FFD700;
    box-shadow: 0 5px 0 #B84700;
    color: white;
    font-weight: bold;
  }
  .diff-btn:active { transform: translateY(3px); }

  /* ボタン */
  button {
    font-size: 34px;
    font-family: inherit;
    background: linear-gradient(135deg, #FF6B00, #FFD700);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 18px 55px;
    cursor: pointer;
    box-shadow: 0 8px 0 #B84700;
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  button:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #B84700;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 12px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    pointer-events: none;
  }
  .hud-box {
    background: rgba(0,0,0,0.65);
    border-radius: 16px;
    padding: 8px 18px;
    font-size: 26px;
    font-weight: bold;
    color: white;
  }
  .hud-box span { color: #FFD700; }
  #hudButtons {
    display: flex;
    gap: 10px;
    pointer-events: all;
  }
  .icon-btn {
    font-size: 24px;
    padding: 8px 16px;
    border-radius: 16px;
    background: rgba(0,0,0,0.65);
    box-shadow: 0 4px 0 rgba(0,0,0,0.4);
    color: white;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

  /* 問題ボックス */
  #questionBox {
    position: absolute;
    top: 68px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.78);
    border-radius: 20px;
    padding: 12px 36px;
    pointer-events: none;
    white-space: nowrap;
    border: 2px solid rgba(255,215,0,0.4);
  }
  #questionText {
    font-size: 38px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 2px 2px 0 #FF6B00;
  }

  /* ポーズ画面 */
  #pauseScreen { display: none; }
  #pauseScreen h1 { animation: none; color: #A0FFFF; text-shadow: 3px 3px 0 #0088AA; }
  .btn-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn-secondary {
    font-size: 26px;
    font-family: inherit;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 3px solid rgba(255,255,255,0.4);
    border-radius: 50px;
    padding: 12px 36px;
    cursor: pointer;
    box-shadow: none;
    text-shadow: none;
    transition: background 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.25); }

  /* カウントダウン */
  #countdown {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 150px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 6px 6px 0 #FF6B00;
    pointer-events: none;
    display: none;
  }
  #status {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    pointer-events: none;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="container">
  <canvas id="gameCanvas"></canvas>

  <!-- スタート画面 -->
  <div id="screen">
    <div id="startScreen" class="overlay">
      <h1>からだでアソボ！</h1>
      <p class="subtitle">あたまとからだのトレーニング</p>
      <p class="hint">
        📷 カメラにうつって てをのばしてこたえよう！<br>
        🪑 すわったままでもOK！<br>
        🎨 いろのもんだい・🔢 けいさんもんだい<br>
        ✅ ただしいこたえのバブルにさわってね<br>
        ❤️ まちがえると ライフがへるよ
      </p>

      <p class="diff-label">むずかしさをえらんでね</p>
      <div class="diff-row">
        <button class="diff-btn" data-diff="easy">⭐ かんたん</button>
        <button class="diff-btn selected" data-diff="normal">⭐⭐ ふつう</button>
        <button class="diff-btn" data-diff="hard">⭐⭐⭐ むずかしい</button>
      </div>

      <button id="startBtn" disabled>はじめる！</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div id="gameOverScreen" class="overlay hidden">
      <h1>ゲームオーバー</h1>
      <p class="subtitle" id="finalScore"></p>
      <p class="hint" id="highScoreMsg"></p>
      <button id="retryBtn">もういちど！</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-box">❤️ <span id="lives">3</span></div>
    <div class="hud-box">⭐ <span id="score">0</span></div>
    <div class="hud-box">LV <span id="level">1</span></div>
    <div id="hudButtons">
      <button class="icon-btn" id="pauseBtn" title="ポーズ">⏸</button>
      <button class="icon-btn" id="stopBtn"  title="やめる">⏹</button>
    </div>
  </div>

  <!-- 問題ボックス -->
  <div id="questionBox" class="hidden">
    <div id="questionText"></div>
  </div>

  <!-- ポーズ画面 -->
  <div id="screen2" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;">
    <div id="pauseScreen" class="overlay">
      <h1>⏸ ポーズ中</h1>
      <p class="hint" style="margin-bottom:24px;">ちょっとやすもう！</p>
      <div class="btn-row">
        <button id="resumeBtn">▶ つづける</button>
        <button class="btn-secondary" id="quitBtn">🏠 タイトルへ</button>
      </div>
    </div>
  </div>

  <!-- カウントダウン -->
  <div id="countdown"></div>

  <div id="status">カメラを読み込み中...</div>
</div>

<script src="game.js"></script>
</body>
</html>
